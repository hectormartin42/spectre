UI menu.c32
PROMPT 0
MENU TITLE Spectre OS 0.1.0
TIMEOUT 50
DEFAULT spectre

LABEL spectre
    MENU LABEL Spectre OS 0.1.0 (Phantom)
    LINUX boot/vmlinuz-linux
    INITRD boot/initramfs-linux.img
    APPEND archisobasedir=arch archisolabel=SPECTRE_OS quiet splash

LABEL spectre-forensics
    MENU LABEL Spectre OS — Forensics Mode
    LINUX boot/vmlinuz-linux
    INITRD boot/initramfs-linux.img
    APPEND archisobasedir=arch archisolabel=SPECTRE_OS quiet spectre.forensics=1

LABEL memtest
    MENU LABEL Memory Test (memtest86+)
    LINUX boot/memtest86+/memtest.bin
