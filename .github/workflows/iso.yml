name: Build ISO

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install archiso
        run: pacman -Syu --noconfirm archiso

      - name: Build Spectre ISO
        run: sudo bash iso/build.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: spectre-os-iso
          path: out/*.iso

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.iso
            out/*.sha256
          body: |
            ## Spectre OS ${{ github.ref_name }}

            ### Download
            | File | Description |
            |------|-------------|
            | `spectre-os-*.iso` | Bootable ISO |
            | `*.sha256` | SHA256 checksum |

            ### Quick boot (QEMU)
            ```bash
            qemu-system-x86_64 -m 2G -cdrom spectre-os-*.iso -boot d -enable-kvm
            ```

            ### Write to USB
            ```bash
            sudo dd if=spectre-os-*.iso of=/dev/sdX bs=4M status=progress && sync
            ```
