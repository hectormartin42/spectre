# Spectre — Kitty terminal config

font_family      JetBrainsMono Nerd Font
font_size        13.0
bold_font        auto
italic_font      auto
bold_italic_font auto

cursor_shape           block
cursor_blink_interval  0

scrollback_lines 10000

window_padding_width 8

# Spectre color scheme (dark + neon green/cyan)
background            #0a0e0f
foreground            #c0caf5
selection_background  #1a1f2e
selection_foreground  #c0caf5

color0  #15161e
color1  #f7768e
color2  #00ff9f
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #00d4ff
color7  #a9b1d6
color8  #414868
color9  #f7768e
color10 #00ff9f
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #00d4ff
color15 #c0caf5

cursor #00ff9f

tab_bar_style powerline
tab_powerline_style slanted
active_tab_foreground   #0a0e0f
active_tab_background   #00ff9f
inactive_tab_foreground #a9b1d6
inactive_tab_background #1a1f2e
